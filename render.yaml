services:
  - type: web
    name: market-screener
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FMP_API_KEY
        sync: false   # prompts you to paste the key in the Render dashboard
    healthCheckPath: /api/markets
